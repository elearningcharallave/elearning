<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-config.js"></script>
<script src="../assets/app.js"></script>
<script src="test-engine.js"></script>
<script>
const QS = [
  {type:'tf',text:'En Excel, toda fórmula debe comenzar con el signo igual (=).',correct:true,fb:'El signo = indica a Excel que lo que sigue es una fórmula y no texto.'},
  {type:'tf',text:'La función SUMA() puede sumar solo dos celdas a la vez, no rangos.',correct:false,fb:'SUMA() puede sumar rangos completos, por ejemplo =SUMA(A1:A100) suma 100 celdas.'},
  {type:'tf',text:'En una referencia absoluta como $A$1, la fila y la columna no cambian al copiar la fórmula.',correct:true,fb:'El signo $ fija tanto la columna como la fila, por lo que no se ajusta al copiar.'},
  {type:'tf',text:'La función PROMEDIO() divide la suma entre el número de celdas, incluyendo las vacías.',correct:false,fb:'PROMEDIO() ignora celdas vacías y divide solo entre las celdas con valores numéricos.'},
  {type:'tf',text:'La referencia A1:C3 representa un rango de 9 celdas en total.',correct:true,fb:'Cubre 3 columnas (A, B, C) × 3 filas (1, 2, 3) = 9 celdas.'},
  {type:'tf',text:'La función MAX() devuelve el valor más pequeño de un rango.',correct:false,fb:'MAX() devuelve el valor más grande. Para el más pequeño se usa MIN().'},
  {type:'tf',text:'En Excel, se puede usar el operador & para unir (concatenar) texto de varias celdas.',correct:true,fb:'Por ejemplo, =A1&" "&B1 une el contenido de A1 y B1 con un espacio entre ellos.'},
  {type:'tf',text:'La función CONTAR() cuenta celdas que contienen cualquier tipo de dato, incluido texto.',correct:false,fb:'CONTAR() solo cuenta celdas con valores numéricos. Para texto se usa CONTARA().'},
  {type:'tf',text:'Una referencia relativa como A1 se ajusta automáticamente al copiar la fórmula a otra celda.',correct:true,fb:'Si copias =A1+B1 hacia abajo, pasa a =A2+B2, =A3+B3, etc.'},
  {type:'tf',text:'La función SI() puede devolver solo valores numéricos, no texto.',correct:false,fb:'SI() puede devolver texto, números, fórmulas o incluso otras funciones anidadas.'},
  {type:'tf',text:'=5^2 en Excel calcula 5 elevado al cuadrado y devuelve 25.',correct:true,fb:'El operador ^ es el de potenciación en Excel.'},
  {type:'tf',text:'La función HOY() devuelve la fecha y hora actuales del sistema.',correct:false,fb:'HOY() devuelve solo la fecha actual. Para fecha y hora se usa AHORA().'},
  {type:'tf',text:'CONTAR.SI() permite contar celdas que cumplen una condición específica.',correct:true,fb:'Por ejemplo, =CONTAR.SI(A1:A10,">5") cuenta las celdas con valor mayor que 5.'},
  {type:'tf',text:'Al dividir entre cero en Excel, la celda muestra el error #DIV/0!.',correct:true,fb:'Excel no puede dividir entre cero y muestra #DIV/0! para indicarlo.'},
  {type:'tf',text:'La función REDONDEAR() siempre redondea hacia arriba.',correct:false,fb:'REDONDEAR() aplica redondeo estándar. Para siempre subir se usa REDONDEAR.MAS().'},
  {type:'mc',text:'¿Cuál es la sintaxis correcta para sumar el rango de A1 a A10?',options:['=SUMA[A1:A10]','=SUMA(A1:A10)','=SUMAR(A1,A10)'],correct:1,fb:'La sintaxis correcta usa paréntesis y dos puntos para el rango: =SUMA(A1:A10).'},
  {type:'mc',text:'¿Qué función se utiliza para encontrar el valor más alto en un conjunto de datos?',options:['=MAYOR()','=MAX()','=ALTO()'],correct:1,fb:'MAX() devuelve el valor máximo de un rango. Por ejemplo, =MAX(B1:B20).'},
  {type:'mc',text:'Si en A1 tienes 10 y en B1 tienes 3, ¿qué devuelve =MOD(A1,B1)?',options:['3','1','0'],correct:1,fb:'MOD() devuelve el resto de la división. 10 ÷ 3 = 3 con resto 1.'},
  {type:'mc',text:'¿Qué fórmula cuenta únicamente las celdas que contienen texto en un rango?',options:['=CONTAR()','=CONTARA()','=CONTAR.SI()'],correct:1,fb:'CONTARA() cuenta todas las celdas no vacías, incluyendo texto.'},
  {type:'mc',text:'¿Cuál es el operador de potenciación en Excel?',options:['^','**','POW'],correct:0,fb:'El operador ^ eleva un número a una potencia. Por ejemplo, =2^10 devuelve 1024.'},
  {type:'mc',text:'¿Cuántos argumentos obligatorios tiene la función SI()?',options:['1 (solo la condición)','2 (condición y valor si verdadero)','3 (condición, valor si verdadero y valor si falso)'],correct:2,fb:'SI tiene 3 argumentos: =SI(condición, valor_si_verdadero, valor_si_falso).'},
  {type:'mc',text:'¿Qué hace la función CONCATENAR() en Excel?',options:['Suma valores numéricos','Une cadenas de texto en una sola','Cuenta el número de caracteres'],correct:1,fb:'CONCATENAR() une varias cadenas. Por ejemplo, =CONCATENAR("Hola"," ","Mundo") → "Hola Mundo".'},
  {type:'mc',text:'¿Cuál de las siguientes es una referencia mixta?',options:['A1','$A$1','$A1'],correct:2,fb:'Una referencia mixta fija solo columna ($A1) o fila (A$1). $A$1 es absoluta y A1 es relativa.'},
  {type:'mc',text:'¿Qué función convierte texto en minúsculas en Excel?',options:['=MINUSC()','=LOWER()','=TEXTO()'],correct:0,fb:'MINUSC() convierte todo el texto a minúsculas. Por ejemplo, =MINUSC("HOLA") → "hola".'},
  {type:'mc',text:'¿Qué resultado da =REDONDEAR(3.756, 2)?',options:['3.7','3.75','3.76'],correct:2,fb:'REDONDEAR(3.756,2): el tercer decimal es 6 (≥5), sube → resultado 3.76.'},
];
TestEngine.run({ clave:'excel', titulo:'Test de Excel — fórmulas básicas', icono:'📊', acento:'#1d9e75', preguntas:QS });
</script>
